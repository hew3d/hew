# Hew release — tag push `v*` → one DRAFT GitHub Release carrying the full
# installer matrix (see docs/RELEASE_PLANNING in the planning tree, RR8):
#
#   macOS      universal .dmg (+ .app.tar.gz updater bundle)
#   Windows    NSIS -setup.exe, x64 + arm64
#   Linux      AppImage + .deb + .rpm, x64 + arm64 (built on ubuntu-22.04 for
#              the glibc floor — O3)
#   Web        hew-web-vX.Y.Z.tar.gz self-hosting tarball + Cloudflare Pages
#              deploy of app.hew3d.com (skipped loudly until the Cloudflare
#              secrets exist)
#   Updater    latest.json assembled from the per-platform .sig assets by a
#              final job (NOT tauri-action's per-job merge, which loses
#              updates when parallel matrix jobs race the read-modify-write)
#   Notes      the release body gets a platform × architecture download
#              table once all assets exist; it never overwrites a body that
#              already carries one, so hand-edited draft notes survive
#              re-runs
#
# Releases stay DRAFTS. Publishing is a deliberate human act after smoke
# installs.
#
# Signing posture: the updater artifacts are minisign-signed via
# TAURI_SIGNING_PRIVATE_KEY (independent of OS code signing). OS signing
# (Apple notarization, SignPath) is added later by supplying the documented
# secrets — macOS builds are ad-hoc signed and Windows installers unsigned
# until then, which draft smoke tests must expect (right-click-open /
# SmartScreen "More info").
#
# The tagged commit is assumed CI-green — this workflow builds and bundles;
# it does not re-run the verify gate.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  # Version = tag minus the leading `v`; stamped into the bundle via a
  # generated Tauri --config overlay so the in-tree 0.1.0 stays untouched
  # during the v0.0.x test-tag window.
  TAG: ${{ github.ref_name }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Parse and guard the tag
        id: version
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is not vMAJOR.MINOR.PATCH — refusing to release."
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases" \
            -f tag_name="$TAG" \
            -f name="Hew $TAG" \
            -f body="Build in progress — the download table is added when all artifacts have been uploaded." \
            -F draft=true \
            --jq '.id')"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            os: macos-latest
            args: --target universal-apple-darwin --bundles app,dmg
          - name: windows-x64
            os: windows-latest
            args: --bundles nsis
          - name: windows-arm64
            os: windows-11-arm
            args: --bundles nsis
          - name: linux-x64
            os: ubuntu-22.04
            args: --bundles appimage,deb,rpm
          - name: linux-arm64
            os: ubuntu-22.04-arm
            args: --bundles appimage,deb,rpm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Same stack ci.yml installs for the Tauri host crate, plus xdg-utils:
      # the AppImage bundler embeds /usr/bin/xdg-open, which the arm64 runner
      # image (unlike x64) does not preinstall.
      - name: System libs (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config build-essential libssl-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev \
            xdg-utils

      # rustup honors rust-toolchain.toml (stable + wasm32-unknown-unknown)
      # on the first cargo invocation; the universal build additionally needs
      # both macOS targets present up front.
      - name: Add macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            shells/tauri/src-tauri

      # Unix: the official prebuilt-binary installer (covers arm64 too).
      # Windows: cargo install (the npm/installer shims aren't spawnable by
      # build-wasm.mjs's spawnSync), with the compiled exe cached like
      # desktop-e2e.yml caches tauri-driver.
      - name: Cache wasm-pack (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/wasm-pack.exe
          key: wasm-pack-${{ runner.os }}-${{ runner.arch }}

      - name: Install wasm-pack
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            command -v wasm-pack || cargo install wasm-pack --locked
          else
            curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          fi

      # wasm-pack has no prebuilt wasm-opt for Windows-on-ARM and hard-fails
      # there; it looks for wasm-opt on PATH before downloading, so supply
      # binaryen's native arm64 build instead of shipping an unoptimized
      # kernel in that installer.
      - name: Install wasm-opt (Windows arm64)
        if: matrix.name == 'windows-arm64'
        shell: pwsh
        run: |
          curl.exe -sSL -o "$env:RUNNER_TEMP\binaryen.tar.gz" `
            https://github.com/WebAssembly/binaryen/releases/download/version_130/binaryen-version_130-arm64-windows.tar.gz
          tar -xzf "$env:RUNNER_TEMP\binaryen.tar.gz" -C $env:RUNNER_TEMP
          Add-Content $env:GITHUB_PATH "$env:RUNNER_TEMP\binaryen-version_130\bin"

      - name: Enable pnpm
        shell: bash
        run: corepack enable && corepack prepare pnpm@11.8.0 --activate

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/Library/pnpm/store
            ~/AppData/Local/pnpm/store
          key: pnpm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-${{ runner.arch }}-

      - name: Install JS dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      # The overlay also switches on updater-artifact creation (.app.tar.gz /
      # .sig files). That flag lives HERE, not in tauri.conf.json, on purpose:
      # with it in the base config, a keyless local `pnpm --dir shells/tauri
      # build` would fail demanding TAURI_SIGNING_PRIVATE_KEY.
      - name: Stamp release version
        shell: bash
        run: |
          printf '{"version": "%s", "bundle": {"createUpdaterArtifacts": true}}\n' \
            "${TAG#v}" > release-version.json

      # Apple code signing + notarization (RR9). Exported through GITHUB_ENV
      # only when the secrets exist: `env:` on a step always materializes
      # unset secrets as empty strings, and an empty APPLE_SIGNING_IDENTITY
      # would send codesign chasing an identity named "" instead of falling
      # back to ad-hoc signing. With no secrets set, this step is a no-op and
      # the macOS build stays ad-hoc signed (the pre-RR9 posture). tauri-action
      # imports the .p12 into a throwaway keychain; notarization (and
      # stapling) engage only when the App Store Connect API-key trio exists.
      - name: Stage Apple signing credentials
        if: runner.os == 'macOS'
        shell: bash
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          API_KEY: ${{ secrets.APPLE_API_KEY }}
          API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          if [ -n "$CERT" ]; then
            {
              echo "APPLE_CERTIFICATE<<__EOF__";          echo "$CERT";          echo "__EOF__"
              echo "APPLE_CERTIFICATE_PASSWORD<<__EOF__"; echo "$CERT_PASSWORD"; echo "__EOF__"
              echo "APPLE_SIGNING_IDENTITY=$IDENTITY"
              echo "APPLE_TEAM_ID=$TEAM_ID"
            } >> "$GITHUB_ENV"
            echo "::notice::Apple code signing enabled."
          else
            echo "::notice::APPLE_CERTIFICATE not set — macOS build will be ad-hoc signed."
          fi
          if [ -n "$API_KEY_CONTENT" ]; then
            printf '%s\n' "$API_KEY_CONTENT" > "$RUNNER_TEMP/apple-api-key.p8"
            {
              echo "APPLE_API_ISSUER=$API_ISSUER"
              echo "APPLE_API_KEY=$API_KEY"
              echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/apple-api-key.p8"
            } >> "$GITHUB_ENV"
            echo "::notice::Notarization enabled."
          else
            echo "::notice::App Store Connect API key not set — skipping notarization."
          fi

      # tauri-action runs beforeBuildCommand (app build, which builds the
      # WASM kernel via build-wasm.mjs), bundles, and uploads the artifacts
      # plus their .sig files to the draft release. includeUpdaterJson stays
      # OFF — the updater-manifest job assembles latest.json race-free.
      - name: Build and upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: shells/tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: false
          # Without this, tauri-action falls back to `npm run tauri`, which
          # doesn't exist here — the CLI is a pnpm-managed devDependency.
          tauriScript: pnpm tauri
          args: ${{ matrix.args }} --config ${{ github.workspace }}/release-version.json

  web:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.8.0 --activate

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-X64-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-X64-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # app build + CSP <meta> injection (shells/web/inject-csp.mjs).
      - name: Build web shell
        run: pnpm --dir shells/web build

      # The self-hosting artifact: "unzip behind any static file server".
      # Deliberately excludes the Cloudflare-specific _headers file.
      - name: Pack and upload self-hosting tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          tar -czf "hew-web-$TAG.tar.gz" -C shells/web/dist .
          # Idempotent: GitHub 422s on duplicate asset names, so a re-run of
          # this job (e.g. to fire the Cloudflare deploy after the secrets
          # appear) must first drop the asset it uploaded last time.
          existing="$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" --paginate \
            --jq ".[] | select(.name == \"hew-web-$TAG.tar.gz\") | .id")"
          [ -z "$existing" ] || gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$existing"
          gh api --method POST \
            -H "Content-Type: application/gzip" \
            "https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?name=hew-web-$TAG.tar.gz" \
            --input "hew-web-$TAG.tar.gz"

      # app.hew3d.com — direct upload so the deployed bits are exactly the
      # release build (RR11). Self-skips until the Cloudflare project +
      # secrets exist. `frame-ancestors` can't live in the injected <meta>
      # CSP, so it rides the host-level _headers file (see shells/web/README).
      - name: Deploy app.hew3d.com (Cloudflare Pages)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::notice::Cloudflare secrets not set — skipping the app.hew3d.com deploy."
            exit 0
          fi
          cp shells/web/_headers shells/web/dist/_headers
          npx wrangler@4 pages deploy shells/web/dist \
            --project-name=hew-app --branch=main --commit-dirty=true

  # Assemble latest.json from the uploaded .sig assets. A single writer after
  # the whole matrix, so no read-modify-write races. URLs use the published
  # asset path (/releases/download/<tag>/…) — they resolve once the draft is
  # published; during the draft window the updater is tested against an
  # explicit endpoint override (RELEASE_PLANNING §14 step 9).
  updater-manifest:
    needs: [create-release, desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Build and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" --paginate \
            --jq '.[] | [.name, .id] | @tsv' > assets.tsv
          cat assets.tsv

          sig_for() { # sig_for <asset-name> → prints signature file content
            local id
            id="$(awk -F'\t' -v n="$1.sig" '$1 == n {print $2}' assets.tsv)"
            [ -n "$id" ] || { echo "::error::Missing $1.sig on the release." >&2; exit 1; }
            gh api -H "Accept: application/octet-stream" \
              "repos/$GITHUB_REPOSITORY/releases/assets/$id"
          }

          name_matching() { # name_matching <regex> → exactly one asset name
            local m
            m="$(cut -f1 assets.tsv | grep -E "$1" | grep -v '\.sig$' || true)"
            [ "$(echo "$m" | grep -c .)" -eq 1 ] || {
              echo "::error::Expected exactly one asset matching '$1', got: $m" >&2; exit 1; }
            echo "$m"
          }

          MAC=$(name_matching '\.app\.tar\.gz$')
          WIN_X64=$(name_matching 'x64.*-setup\.exe$')
          WIN_ARM=$(name_matching 'arm64.*-setup\.exe$')
          LIN_X64=$(name_matching '(amd64|x86_64).*\.AppImage$')
          LIN_ARM=$(name_matching '(arm64|aarch64).*\.AppImage$')

          url() { echo "https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG/$1"; }

          # Bare assignments, NOT inline $(sig_for …) in the jq argument list:
          # an exit inside a command substitution used as one argument among
          # many is swallowed by bash, and a missing .sig would ship a
          # latest.json with a blank signature while the job reports green.
          MAC_SIG=$(sig_for "$MAC")
          WX_SIG=$(sig_for "$WIN_X64")
          WA_SIG=$(sig_for "$WIN_ARM")
          LX_SIG=$(sig_for "$LIN_X64")
          LA_SIG=$(sig_for "$LIN_ARM")

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg mac_url "$(url "$MAC")"         --arg mac_sig "$MAC_SIG" \
            --arg wx_url  "$(url "$WIN_X64")"     --arg wx_sig  "$WX_SIG" \
            --arg wa_url  "$(url "$WIN_ARM")"     --arg wa_sig  "$WA_SIG" \
            --arg lx_url  "$(url "$LIN_X64")"     --arg lx_sig  "$LX_SIG" \
            --arg la_url  "$(url "$LIN_ARM")"     --arg la_sig  "$LA_SIG" \
            '{
              version: $version,
              notes: "Hew \($version)",
              pub_date: $pub_date,
              platforms: {
                "darwin-x86_64":  { url: $mac_url, signature: $mac_sig },
                "darwin-aarch64": { url: $mac_url, signature: $mac_sig },
                "windows-x86_64": { url: $wx_url,  signature: $wx_sig },
                "windows-aarch64":{ url: $wa_url,  signature: $wa_sig },
                "linux-x86_64":   { url: $lx_url,  signature: $lx_sig },
                "linux-aarch64":  { url: $la_url,  signature: $la_sig }
              }
            }' > latest.json

          jq . latest.json

          # Idempotent for the same reason as the web tarball: a re-run must
          # replace, not collide with, the latest.json it uploaded before.
          # assets.tsv predates this upload, so it holds any previous copy.
          existing="$(awk -F'\t' '$1 == "latest.json" {print $2}' assets.tsv)"
          [ -z "$existing" ] || gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$existing"
          gh api --method POST \
            -H "Content-Type: application/json" \
            "https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?name=latest.json" \
            --input latest.json

  # Replace the placeholder body with a platform × architecture download
  # table once every asset is up. Asset names are constructed from the same
  # naming scheme the bundlers use and each one is checked against the real
  # asset list, so a bundler rename fails the job instead of shipping dead
  # links. A body that already contains a download table is left alone — a
  # re-run of this single job must not clobber hand-edited draft notes.
  # (Re-running the whole workflow still mints a fresh draft via
  # create-release; that is the pre-existing deal for every job here.)
  release-notes:
    needs: [create-release, desktop, web]
    runs-on: ubuntu-latest
    steps:
      - name: Write the download table into the release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          VERSION: ${{ needs.create-release.outputs.version }}
          # The macOS bullet must not promise a signature the desktop job
          # only produces when the Apple secrets exist.
          APPLE_SIGNED: ${{ secrets.APPLE_CERTIFICATE != '' }}
        run: |
          set -euo pipefail
          # Capture the body first: `gh | grep -q` under pipefail can report
          # SIGPIPE as failure on an early match, reading "table present" as
          # "table absent" — exactly the clobber this guard exists to stop.
          body="$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq '.body')"
          if grep -q '## Downloads' <<<"$body"; then
            echo "::notice::Body already carries a download table — leaving it untouched."
            exit 0
          fi

          gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" --paginate \
            --jq '.[].name' > assets.txt

          need() {
            grep -qxF "$1" assets.txt || {
              echo "::error::Expected release asset '$1' is missing." >&2; exit 1; }
          }

          MAC="Hew_${VERSION}_universal.dmg";        need "$MAC"
          WIN_X64="Hew_${VERSION}_x64-setup.exe";    need "$WIN_X64"
          WIN_ARM="Hew_${VERSION}_arm64-setup.exe";  need "$WIN_ARM"
          AI_X64="Hew_${VERSION}_amd64.AppImage";    need "$AI_X64"
          AI_ARM="Hew_${VERSION}_aarch64.AppImage";  need "$AI_ARM"
          DEB_X64="Hew_${VERSION}_amd64.deb";        need "$DEB_X64"
          DEB_ARM="Hew_${VERSION}_arm64.deb";        need "$DEB_ARM"
          RPM_X64="Hew-${VERSION}-1.x86_64.rpm";     need "$RPM_X64"
          RPM_ARM="Hew-${VERSION}-1.aarch64.rpm";    need "$RPM_ARM"
          WEB="hew-web-v${VERSION}.tar.gz";          need "$WEB"

          url() { echo "https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG/$1"; }

          if [ "$APPLE_SIGNED" = "true" ]; then
            MAC_NOTE="The macOS disk image is signed and notarized; one universal app"
          else
            MAC_NOTE="One universal macOS app"
          fi

          cat > body.md <<EOF
          _Draft: replace this line with release highlights before publishing._

          ## Downloads

          The [download page](https://hew3d.com/download) picks the right build
          for your system, or grab a file directly:

          | Platform | x64 / Intel | ARM64 / Apple Silicon |
          | --- | --- | --- |
          | **macOS** — disk image | [universal .dmg][mac] | [universal .dmg][mac] |
          | **Windows** — installer | [.exe][win-x64] | [.exe][win-arm64] |
          | **Linux** — AppImage | [.AppImage][ai-x64] | [.AppImage][ai-arm64] |
          | **Linux** — Debian/Ubuntu | [.deb][deb-x64] | [.deb][deb-arm64] |
          | **Linux** — Fedora/openSUSE | [.rpm][rpm-x64] | [.rpm][rpm-arm64] |
          | **Web** — self-hosting tarball | [.tar.gz][web] | [.tar.gz][web] |

          - $MAC_NOTE
            covers Apple Silicon and Intel.
          - Windows installers are not code-signed yet, so SmartScreen may
            warn on first run — choose **More info**, then **Run anyway**.
          - On Linux, mark the AppImage executable (\`chmod +x\`) before
            first run, or install the .deb/.rpm.
          - Desktop builds update themselves; \`latest.json\` and the
            \`.sig\` assets serve that built-in updater and are not meant
            for manual download.
          - Or skip installing entirely: Hew runs in the browser at
            [app.hew3d.com](https://app.hew3d.com).

          [mac]: $(url "$MAC")
          [win-x64]: $(url "$WIN_X64")
          [win-arm64]: $(url "$WIN_ARM")
          [ai-x64]: $(url "$AI_X64")
          [ai-arm64]: $(url "$AI_ARM")
          [deb-x64]: $(url "$DEB_X64")
          [deb-arm64]: $(url "$DEB_ARM")
          [rpm-x64]: $(url "$RPM_X64")
          [rpm-arm64]: $(url "$RPM_ARM")
          [web]: $(url "$WEB")
          EOF

          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F body=@body.md > /dev/null
          echo "::notice::Download table written to the release body."
