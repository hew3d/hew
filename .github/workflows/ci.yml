# Hew CI — mirrors scripts/verify.sh (the canonical local gate: fmt +
# clippy -D warnings + cargo test + wasm-pack + Vitest + app build + the
# site build + the Tauri host crate's fmt/clippy), then adds the replay
# gate, the web-E2E smoke, and the visual goldens, and artifacts the built
# web app.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The Tauri host crate's clippy pass needs the webkit2gtk/gtk stack;
      # the Playwright/WebGL smoke needs xvfb for the non-headless engines.
      - name: System libs (Tauri + WebGL)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config build-essential libssl-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev \
            xvfb xauth

      # rustup honors rust-toolchain.toml (stable + rustfmt + clippy +
      # wasm32-unknown-unknown) on the first cargo invocation.
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            shells/tauri/src-tauri

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.8.0 --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify (fmt, clippy, cargo test, wasm, vitest, builds)
        run: scripts/verify.sh

      # Replay gate — replay every committed recording into a fresh kernel
      # and assert its golden state_hash still matches. Needs a separate
      # wasm build: the runner consumes `--target nodejs` (CommonJS)
      # bindings, distinct from verify.sh's `--target web` app build.
      # NB: wasm-pack's --out-dir is relative to the crate dir.
      - name: Build kernel for Node (replay runner)
        run: wasm-pack build crates/wasm-api --target nodejs --out-dir ../../tools/replay-runner/pkg-node

      - name: Replay gate (golden state-hash fixtures)
        run: node tools/replay-runner/run.mjs

      - name: Install Playwright browsers
        run: pnpm --dir app exec playwright install --with-deps chromium webkit

      # Chromium (SwiftShader software GL): boot smoke, harness specs, and
      # the draw → push/pull → save/reload lifecycle.
      - name: Web E2E smoke (chromium)
        env:
          CI: '1'
        run: pnpm --dir app exec playwright test --project=chromium

      # WebKit (WebKitGTK) — the engine closest to the macOS WKWebView.
      # Runs under Xvfb because headless WebKitGTK needs a display + system
      # GL (llvmpipe) to bring up the WebGL2 viewport. Non-blocking until
      # validated green on GitHub-hosted runners; then drop
      # continue-on-error to make it a required gate.
      - name: Web E2E smoke (webkit) [validating — non-blocking]
        continue-on-error: true
        env:
          CI: '1'
        run: xvfb-run -a pnpm --dir app exec playwright test --project=webkit

      # Visual-regression goldens on the pinned `visual` project (fixed
      # 800×600 / DPR=1 / SwiftShader). The renderer is ANGLE-SwiftShader
      # bundled with Playwright's pinned Chromium, so output should be
      # reproducible across hosts on the same @playwright/test version.
      # Non-blocking until a green run confirms the goldens reproduce on
      # GitHub-hosted runners; regenerate once here (`e2e:visual:update`)
      # and commit the PNGs if they diverge, then make this required.
      - name: Web E2E visual goldens [validating — non-blocking]
        continue-on-error: true
        env:
          CI: '1'
        run: pnpm --dir app exec playwright test --project=visual

      - name: Upload built web app
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: app/dist
          if-no-files-found: warn

      - name: Upload built site
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site/dist
          if-no-files-found: warn

      - name: Upload Playwright report on failure
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report
          if-no-files-found: ignore
